name: Playwright Tests

on:
  schedule:
    - cron: '0 10,22 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Job timeout

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Or your preferred Node version (18, 20, etc.)

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      env:
        # Sets CI=true which your config uses to enable retries and set workers to 1
        CI: true 
        # Set your Base URL here or in GitHub Secrets
        BASE_URL: ${{ secrets.BASE_URL || 'https://datastore.geowgs84.com' }}
        
        # If your email reporter needs credentials, uncomment and add these secrets in GitHub Settings
        # SMTP_HOST: ${{ secrets.SMTP_HOST }}
        # SMTP_USER: ${{ secrets.SMTP_USER }}
        # SMTP_PASS: ${{ secrets.SMTP_PASS }}
      run: npx playwright test

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      if: always() # Runs even if tests fail
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results (Videos/Traces)
      uses: actions/upload-artifact@v4
      if: failure() # Only uploads if tests fail
      with:
        name: test-results
        path: test-results/
        retention-days: 30
